<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Ionic App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #1c1c1e; color: #fff; display: flex; height: 100vh; }

    .sidebar {
      width: 300px; min-width: 300px;
      background: #1c1c1e;
      border-right: 1px solid rgba(255,255,255,0.1);
      display: flex; flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 16px 8px;
    }

    .sidebar-header h2 { font-size: 20px; font-weight: 700; color: #fff; }
    .sidebar-header p { font-size: 13px; color: rgba(255,255,255,0.4); margin-top: 2px; }

    .menu-list { list-style: none; padding: 8px 0; }

    .menu-item {
      display: flex; align-items: center; gap: 16px;
      padding: 12px 16px; cursor: pointer;
      color: rgba(255,255,255,0.6); font-size: 15px;
      transition: background 0.2s;
    }

    .menu-item:hover { background: rgba(255,255,255,0.05); }
    .menu-item.active { color: #4d8dff; background: rgba(77,141,255,0.08); }

    .menu-item ion-icon, .menu-item .icon {
      font-size: 20px; width: 24px; text-align: center;
    }

    .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 0; }

    .label-header {
      padding: 8px 16px 4px;
      font-size: 12px; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 1px;
    }

    .content {
      flex: 1;
      display: flex; flex-direction: column;
    }

    .content-header {
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      font-size: 16px; font-weight: 600;
    }

    .content-body {
      flex: 1; display: flex;
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: rgba(255,255,255,0.5);
    }

    .content-body h3 { font-size: 20px; font-weight: 600; color: #fff; }
    .content-body a { color: #4d8dff; text-decoration: none; font-size: 14px; }

    .cat-img {
      width: 300px; border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h2>Inbox</h2>
    <p>Pongsakorn Sinhoyrak</p>
  </div>

  <ul class="menu-list">
    <li class="menu-item active" onclick="showPage('inbox')">
      <span class="icon">✉️</span> Inbox
    </li>
    <li class="menu-item" onclick="showPage('outbox')">
      <span class="icon">📤</span> Outbox
    </li>
    <li class="menu-item" onclick="showPage('favorites')">
      <span class="icon">❤️</span> Favorites
    </li>
    <li class="menu-item" onclick="showPage('archived')">
      <span class="icon">📥</span> Archived
    </li>
    <li class="menu-item" onclick="showPage('trash')">
      <span class="icon">🗑️</span> Trash
    </li>
    <li class="menu-item" onclick="showPage('spam')">
      <span class="icon">⚠️</span> Spam
    </li>
    <li class="menu-item" onclick="showPage('test')">
      <span class="icon">🐱</span> Test Page
    </li>
  </ul>

  <div class="divider"></div>
  <div class="label-header">Labels</div>
  <ul class="menu-list">
    <li class="menu-item"><span class="icon">🔖</span> Family</li>
    <li class="menu-item"><span class="icon">🔖</span> Friends</li>
    <li class="menu-item"><span class="icon">🔖</span> Notes</li>
    <li class="menu-item"><span class="icon">🔖</span> Work</li>
    <li class="menu-item"><span class="icon">🔖</span> Travel</li>
    <li class="menu-item"><span class="icon">🔖</span> Reminders</li>
  </ul>
</div>

<div class="content">
  <div class="content-header" id="page-title">inbox</div>
  <div class="content-body" id="page-body">
    <h3>inbox</h3>
    <a href="#">Explore UI Components</a>
    <p>Pongsakorn Sinhoyrak</p>
  </div>
</div>

<script>
  function showPage(name) {
    document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.getElementById('page-title').textContent = name;

    if (name === 'test') {
      document.getElementById('page-body').innerHTML = `
        <h3>Test Page</h3>
        <img class="cat-img" src="https://http.cat/images/200.jpg" alt="cat"/>
        <p>Pongsakorn Sinhoyrak</p>
      `;
    } else {
      document.getElementById('page-body').innerHTML = `
        <h3>${name}</h3>
        <a href="#">Explore UI Components</a>
        <p>Pongsakorn Sinhoyrak</p>
      `;
    }
  }
</script>

</body>
</html>
